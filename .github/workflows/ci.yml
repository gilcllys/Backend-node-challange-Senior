name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: brain_ag
          POSTGRES_PASSWORD: brain_ag_pass
          POSTGRES_DB: brain_agriculture
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brain_ag -d brain_agriculture"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: brain_ag
      DB_PASSWORD: brain_ag_pass
      DB_DATABASE: brain_agriculture

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --ci --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e -- --ci --passWithNoTests

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t backend-challeng:${{ github.sha }} .
